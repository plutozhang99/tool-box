<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{PROJECT_NAME}} — Docs Q&A</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f0f0f; color: #e0e0e0;
    display: flex; flex-direction: column; height: 100vh;
  }
  header {
    padding: 16px 24px; border-bottom: 1px solid #222;
    display: flex; align-items: center; gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 600; }
  header .status { font-size: 12px; color: #666; margin-left: auto; }
  header .status.ok { color: #4ade80; }
  .chat {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 16px;
  }
  .msg { max-width: 800px; width: 100%; margin: 0 auto; line-height: 1.6; }
  .msg.user { color: #93c5fd; }
  .msg.user::before { content: '> '; color: #3b82f6; font-weight: bold; }
  .msg.assistant { color: #e0e0e0; }
  .msg.assistant pre {
    background: #1a1a1a; padding: 12px; border-radius: 6px;
    overflow-x: auto; margin: 8px 0;
  }
  .msg.assistant code { font-size: 13px; }
  .sources {
    font-size: 12px; color: #888; margin-top: 8px;
    border-top: 1px solid #222; padding-top: 8px;
  }
  .sources span { color: #60a5fa; }
  .input-area {
    border-top: 1px solid #222; padding: 16px 24px;
    display: flex; gap: 12px; max-width: 848px; width: 100%; margin: 0 auto;
  }
  .input-area input {
    flex: 1; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; padding: 12px 16px; color: #e0e0e0;
    font-size: 14px; outline: none;
  }
  .input-area input:focus { border-color: #3b82f6; }
  .input-area input::placeholder { color: #555; }
  .input-area button {
    background: #3b82f6; color: white; border: none;
    border-radius: 8px; padding: 12px 20px; font-size: 14px;
    cursor: pointer; font-weight: 500;
  }
  .input-area button:hover { background: #2563eb; }
  .input-area button:disabled { background: #333; color: #666; cursor: not-allowed; }
  .actions {
    padding: 8px 24px; display: flex; gap: 8px;
    max-width: 848px; width: 100%; margin: 0 auto;
  }
  .actions button {
    background: #1a1a1a; border: 1px solid #333; color: #888;
    border-radius: 6px; padding: 6px 12px; font-size: 12px; cursor: pointer;
  }
  .actions button:hover { border-color: #3b82f6; color: #e0e0e0; }
  .loading::after {
    content: ''; display: inline-block; width: 6px; height: 14px;
    background: #3b82f6; animation: blink 0.8s infinite;
    vertical-align: text-bottom; margin-left: 2px;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <h1>{{PROJECT_NAME}} Docs Q&A</h1>
  <div class="status" id="status">checking...</div>
</header>

<div class="chat" id="chat"></div>

<div class="actions">
  <button onclick="syncDocs()">Sync (git pull + re-index)</button>
  <button onclick="reindex()">Re-index Only</button>
  <button onclick="clearChat()">Clear Chat</button>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="Ask about the docs..."
         onkeydown="if(event.key==='Enter')ask()" autofocus>
  <button id="sendBtn" onclick="ask()">Send</button>
</div>

<script>
const API = window.location.origin;
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const statusEl = document.getElementById('status');

fetch(`${API}/health`).then(r => r.json()).then(d => {
  statusEl.textContent = `${d.project} | ${d.docs_indexed} chunks`;
  statusEl.className = 'status ok';
}).catch(() => {
  statusEl.textContent = 'API offline';
});

function addMsg(role, html) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = html;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

function clearChat() { chat.innerHTML = ''; }

async function syncDocs() {
  statusEl.textContent = 'syncing...';
  statusEl.className = 'status';
  try {
    const r = await fetch(`${API}/sync`, { method: 'POST' });
    const d = await r.json();
    const pull = d.git_pull;
    statusEl.textContent = `${d.ingest.collection_count} chunks indexed`;
    statusEl.className = 'status ok';
    let msg = `<strong>git pull:</strong> ${escapeHtml(pull.status)} — ${escapeHtml(pull.message)}<br>`;
    msg += `<strong>index:</strong> ${d.ingest.files_indexed} files, ${d.ingest.total_chunks} chunks.`;
    addMsg('assistant', msg);
  } catch (e) {
    statusEl.textContent = 'sync failed';
    addMsg('assistant', `Error: ${escapeHtml(e.message)}`);
  }
}

async function reindex() {
  statusEl.textContent = 'indexing...';
  statusEl.className = 'status';
  try {
    const r = await fetch(`${API}/ingest`, { method: 'POST' });
    const d = await r.json();
    statusEl.textContent = `${d.collection_count} chunks indexed`;
    statusEl.className = 'status ok';
    addMsg('assistant', `Re-indexed ${d.files_indexed} files (${d.total_chunks} chunks).`);
  } catch (e) {
    statusEl.textContent = 'index failed';
    addMsg('assistant', `Error: ${e.message}`);
  }
}

async function ask() {
  const q = input.value.trim();
  if (!q) return;
  input.value = '';
  sendBtn.disabled = true;
  addMsg('user', escapeHtml(q));
  const msgDiv = addMsg('assistant', '<span class="loading"></span>');
  let text = '', sources = [];

  try {
    const resp = await fetch(`${API}/ask`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q, n_context: 5 }),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.type === 'sources') sources = data.sources;
          else if (data.type === 'token') { text += data.token; msgDiv.innerHTML = renderMd(text); }
          else if (data.type === 'done' && sources.length) {
            msgDiv.innerHTML += `<div class="sources">Sources: ${sources.map(s => `<span>${s}</span>`).join(', ')}</div>`;
          }
        } catch {}
      }
    }
  } catch (e) {
    msgDiv.innerHTML = `Error: ${escapeHtml(e.message)}`;
  }
  sendBtn.disabled = false;
  input.focus();
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function renderMd(text) {
  let h = escapeHtml(text);
  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
  h = h.replace(/`([^`]+)`/g, '<code style="background:#1a1a1a;padding:2px 4px;border-radius:3px">$1</code>');
  h = h.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/\n/g, '<br>');
  return h;
}
</script>
</body>
</html>
