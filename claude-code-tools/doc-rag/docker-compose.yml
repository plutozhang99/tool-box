# Example: deploy doc-rag for your project docs
#
# Usage:
#   cp .env.example .env  # fill in API key
#   docker compose up -d
#
# The docs directory is bind-mounted read-only.
# ChromaDB data persists in a named volume.
# "Sync" button does git pull inside the container (needs write access — remove :ro if needed).

services:
  doc-rag:
    build: .
    ports:
      - "${DOC_RAG_PORT:-8100}:${DOC_RAG_PORT:-8100}"
    volumes:
      - ${DOC_RAG_DOCS_DIR:?Set DOC_RAG_DOCS_DIR in .env}:/docs:ro
      - chroma_data:/app/.chroma_db
    environment:
      - DOC_RAG_DOCS_DIR=/docs
      - DOC_RAG_PROJECT=${DOC_RAG_PROJECT:?Set DOC_RAG_PROJECT in .env}
      - DOC_RAG_LLM_PROVIDER=${DOC_RAG_LLM_PROVIDER:-anthropic}
      - DOC_RAG_LLM_MODEL=${DOC_RAG_LLM_MODEL:-}
      - DOC_RAG_PORT=${DOC_RAG_PORT:-8100}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
    restart: unless-stopped

volumes:
  chroma_data:
